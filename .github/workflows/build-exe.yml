name: Build Windows EXE

on:
  push:
    tags:
      - 'v*' # Triggers on version tags (e.g., v1.0.6)
  workflow_dispatch: # Allows manual button-click testing

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # ◄ CHANGED FROM 20 TO 22 TO MATCH ELECTRON 42+ REQUIREMENTS
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build and Package Executable
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Build Artifacts (For Manual Runs)
        uses: actions/upload-artifact@v4
        with:
          name: Luniq-Music-Windows-EXE
          path: |
            dist/*.exe
            dist/*.blockmap
            release/*.exe
            release/*.blockmap
            dist-electron/*.exe
            dist-electron/*.blockmap
          if-no-files-found: warn

      - name: Deploy to GitHub Release (For Version Tags Only)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.exe
            dist/*.blockmap
            release/*.exe
            release/*.blockmap
            dist-electron/*.exe
            dist-electron/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
