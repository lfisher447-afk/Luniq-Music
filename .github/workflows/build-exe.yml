name: Build Windows EXE

on:
  push:
    tags:
      - 'v*' # Triggers whenever you push a tag starting with 'v' (e.g., v1.0.0)
  workflow_dispatch: # Allows you to manually trigger the build from the GitHub Actions UI

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-node-version: 20 # Match this to your local Node version
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Compile Application Assets
        run: npm run build # Or your specific production compilation script

      - name: Build Electron Executable
        run: npx electron-builder --win --publish never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Installer to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.exe
            dist/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
