name: Build Windows EXE

on:
  push:
    tags:
      - 'v*' # Triggers on tags like v1.0.6
  workflow_dispatch: # Allows manual clicking from the Actions tab

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Highly recommended for better-sqlite3 compatibility
          cache: 'npm'

      - name: Install Dependencies
        # This will automatically trigger your "postinstall" script to verify 
        # yt-dlp and rebuild better-sqlite3 for Electron.
        run: npm ci

      - name: Build and Package Executable
        # Because your package.json 'build' command includes 'electron-builder',
        # this single command compiles Vite AND creates the .exe file.
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Installer to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          # Assuming electron-builder outputs to a "dist" or "release" folder. 
          # This wildcard catches the .exe wherever the builder drops it.
          files: |
            dist/*.exe
            dist/*.blockmap
            release/*.exe
            release/*.blockmap
            out/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
