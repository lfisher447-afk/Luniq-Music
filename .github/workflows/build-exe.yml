name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build and Package Executable
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Build Artifacts (For Manual Runs)
        uses: actions/upload-artifact@v4 # ◄ Fixed the typo here
        with:
          name: Luniq-Music-Windows-EXE
          path: |
            **/*.exe
            **/*.blockmap
            !node_modules/**
          if-no-files-found: error # ◄ This forces the build to fail if it can't find the EXE, so we aren't left guessing

      - name: Deploy to GitHub Release (For Version Tags Only)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            **/*.exe
            **/*.blockmap
            !node_modules/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
